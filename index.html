<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1f6f5b">
  <title>Vegas Golf Scorecard</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./styles.css?v=18">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Las Vegas Rule</p>
        <h1>Golf Scorecard</h1>
      </div>
      <div class="top-actions">
        <button id="shareButton" type="button" aria-label="Share app" title="Share app">Share</button>
        <button id="installButton" class="refresh-button" type="button" aria-label="Refresh page" title="Refresh page">↻</button>
      </div>
    </header>

    <main>
      <section class="score-strip" id="scoreStrip" aria-label="Match totals" hidden>
        <div class="team-total team-a">
          <span class="label">Team A</span>
          <strong id="teamATotal">0</strong>
          <span id="teamAMoney">$0.00</span>
        </div>
        <div class="match-meta">
          <span id="holesComplete">0/18</span>
          <span id="coursePar">Par 72</span>
        </div>
        <div class="team-total team-b">
          <span class="label">Team B</span>
          <strong id="teamBTotal">0</strong>
          <span id="teamBMoney">$0.00</span>
        </div>
      </section>

      <nav class="tabs" aria-label="Views">
        <button class="tab active" type="button" data-view="start">Home</button>
        <button class="tab" type="button" data-view="play">Play</button>
        <button class="tab" type="button" data-view="courses">Courses</button>
      </nav>

      <div class="sync-bar" id="syncBar" hidden>
        <span id="syncStatus">Local only</span>
        <button id="editGame" type="button">Edit</button>
      </div>

      <section class="view" id="playView">
        <div class="control-panel">
          <label>
            Course
            <select id="courseSelect"></select>
          </label>
          <label>
            Point value
            <input id="pointValue" type="number" min="0" step="0.25" inputmode="decimal">
          </label>
          <label class="toggle-row">
            <span>Birdie flip</span>
            <input id="birdieFlip" type="checkbox">
          </label>
        </div>

        <section class="scorecard" aria-label="Hole scores">
          <table>
            <thead>
              <tr>
                <th>H</th>
                <th>Par</th>
                <th class="team-a-cell"><input id="playerA1" type="text" autocomplete="off" aria-label="Team A player 1"></th>
                <th class="team-a-cell"><input id="playerA2" type="text" autocomplete="off" aria-label="Team A player 2"></th>
                <th class="team-a-cell calc-head">A#</th>
                <th class="team-a-cell calc-head">A+/-</th>
                <th class="team-b-cell"><input id="playerB1" type="text" autocomplete="off" aria-label="Team B player 1"></th>
                <th class="team-b-cell"><input id="playerB2" type="text" autocomplete="off" aria-label="Team B player 2"></th>
                <th class="team-b-cell calc-head">B#</th>
                <th class="team-b-cell calc-head">B+/-</th>
              </tr>
            </thead>
            <tbody id="scoreRows"></tbody>
            <tfoot>
              <tr>
                <th>Total</th>
                <th id="totalPar">72</th>
                <th id="totalPlayerA1">0</th>
                <th id="totalPlayerA2">0</th>
                <th></th>
                <th id="tableTeamATotal">0</th>
                <th id="totalPlayerB1">0</th>
                <th id="totalPlayerB2">0</th>
                <th></th>
                <th id="tableTeamBTotal">0</th>
              </tr>
            </tfoot>
          </table>
        </section>
      </section>

      <section class="view" id="coursesView">
        <div class="section-heading">
          <h2>Courses</h2>
          <button class="primary" id="addCourse" type="button">Add Course</button>
        </div>
        <div class="course-list" id="courseList"></div>
      </section>

      <section class="view active" id="startView">
        <div class="section-heading">
          <h2>Home</h2>
          <button class="primary" id="newGame" type="button">New Game</button>
        </div>
        <section class="game-section">
          <h3>Playing</h3>
          <div class="history-list" id="playingList"></div>
        </section>
        <section class="game-section">
          <h3>History</h3>
          <div class="history-list" id="historyList"></div>
        </section>
      </section>
    </main>
  </div>

  <div class="course-modal" id="courseModal" hidden>
    <form class="course-form" id="courseForm">
      <div class="modal-head">
        <div>
          <p class="eyebrow">New Course</p>
          <h2>Add Course</h2>
        </div>
        <button class="icon-button" id="cancelCourse" type="button" aria-label="Close add course" title="Close">x</button>
      </div>

      <label>
        Course name
        <input id="newCourseName" type="text" autocomplete="off" required>
      </label>

      <div class="par-editor" aria-label="Course par strokes">
        <section>
          <h3>Holes 1-9</h3>
          <div class="par-list" id="frontNineList"></div>
          <div class="nine-total">Out <strong id="frontNineTotal">36</strong></div>
        </section>
        <section>
          <h3>Holes 10-18</h3>
          <div class="par-list" id="backNineList"></div>
          <div class="nine-total">In <strong id="backNineTotal">36</strong></div>
        </section>
      </div>

      <div class="course-total">Course total <strong id="courseParTotal">72</strong></div>

      <div class="action-row">
        <button class="primary" type="submit">Save Course</button>
        <button type="button" id="cancelCourseBottom">Cancel</button>
      </div>
    </form>
  </div>

  <div class="course-modal" id="gameModal" hidden>
    <form class="course-form game-form" id="gameForm">
      <div class="modal-head">
        <div>
          <p class="eyebrow">Game Setup</p>
          <h2>New Game</h2>
        </div>
        <button class="icon-button" id="cancelGame" type="button" aria-label="Close new game" title="Close">x</button>
      </div>

      <div class="teams-grid">
        <section class="team-card team-a">
          <h3>Team A</h3>
          <label>
            Player 1
            <input id="newPlayerA1" type="text" autocomplete="off" required>
          </label>
          <label>
            Player 2
            <input id="newPlayerA2" type="text" autocomplete="off" required>
          </label>
        </section>
        <section class="team-card team-b">
          <h3>Team B</h3>
          <label>
            Player 3
            <input id="newPlayerB1" type="text" autocomplete="off" required>
          </label>
          <label>
            Player 4
            <input id="newPlayerB2" type="text" autocomplete="off" required>
          </label>
        </section>
      </div>

      <div class="game-options">
        <label>
          Course
          <select id="newGameCourse"></select>
        </label>
        <label>
          Tee
          <select id="newGameTee">
            <option value="red">Red</option>
            <option value="blue">Blue</option>
            <option value="yellow" selected>Yellow</option>
            <option value="white">White</option>
            <option value="black">Black</option>
          </select>
        </label>
        <label>
          Edit code
          <input id="newGameCode" type="text" inputmode="numeric" pattern="[0-9]{2}" maxlength="2" placeholder="00" required>
        </label>
        <label class="toggle-row">
          <span>Birdie flip</span>
          <input id="newGameBirdieFlip" type="checkbox" checked>
        </label>
      </div>

      <div class="action-row">
        <button class="primary" type="submit">Start Game</button>
        <button type="button" id="cancelGameBottom">Cancel</button>
      </div>
    </form>
  </div>

  <div class="course-modal" id="appDialog" hidden>
    <form class="course-form dialog-form" id="dialogForm">
      <div class="modal-head">
        <div>
          <p class="eyebrow" id="dialogEyebrow">Action</p>
          <h2 id="dialogTitle">Confirm</h2>
        </div>
      </div>
      <p class="dialog-message" id="dialogMessage"></p>
      <label id="dialogInputWrap" hidden>
        <span id="dialogInputLabel">Code</span>
        <input id="dialogInput" type="text" inputmode="numeric" autocomplete="off">
      </label>
      <div class="action-row">
        <button class="primary" id="dialogOk" type="submit">OK</button>
        <button id="dialogCancel" type="button">Cancel</button>
      </div>
    </form>
  </div>

  <script src="./supabase-config.js?v=18"></script>
  <script src="./app.js?v=18" defer></script>
</body>
</html>
